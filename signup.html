<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up!</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Images/vinyl icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

</head>
<body>
        <div class="main">
            <input type="checkbox" id="check1" aria-hidden="true">

            <div class="signup">
                <form>
                    <label for="check1" aria-hidden="true">Sign Up:</label>
                    <input type="text" name="user-name" placeholder="Jane Doe" required>
                    <input type="email" name="email" placeholder="janedoe@nomail.con" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button>Sign Up</button>
                </form>
            </div>

            <div class="login">
                <form>
                    <label for="check1" aria-hidden="true">Login:</label>
                    <input type="email" name="email" placeholder="janedoe@nomail.com" required>
                    <input type="password" name="password" placeholder="Password">
                    <button>Log In</button>
                </form>
            </div>
        </div>
</body>
</html>
